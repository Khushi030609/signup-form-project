<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Responsive signup form project with validation">
  <title>Signup Form Project</title>

  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1>Create Your Account</h1>
      <p>Join our platform and start your journey today.</p>
    </div>
  </header>

  <main>
    <section class="signup-section">
      <div class="signup-card">

        <div class="left-panel">
          <img src="assets/signup-banner.jpg" alt="Signup Illustration">
        </div>

        <div class="right-panel">
          <h2>Sign Up</h2>

          <form id="signupForm">

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="Enter your email" required>
              <small class="error" id="emailError"></small>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
              >
              <small class="error" id="passwordError"></small>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm your password"
                required
              >
              <small class="error" id="confirmPasswordError"></small>
            </div>

            <div class="form-group">
              <label for="dob">Date of Birth</label>
              <input type="date" id="dob" required>
            </div>

            <div class="form-group">
              <label>Gender</label>
              <div class="radio-group">
                <label>
                  <input type="radio" name="gender" value="male" required>
                  Male
                </label>

                <label>
                  <input type="radio" name="gender" value="female" required>
                  Female
                </label>

                <label>
                  <input type="radio" name="gender" value="other" required>
                  Other
                </label>
              </div>
            </div>

            <div class="form-group checkbox-group">
              <label>
                <input type="checkbox" id="terms" required>
                I agree to the Terms and Conditions
              </label>
            </div>

            <button type="submit">Create Account</button>

            <p id="successMessage"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Signup Form Project. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
